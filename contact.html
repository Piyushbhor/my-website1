<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - FastExpress</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Header */
header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #ff4d4d;
}

/* Contact Section */
.contact {
    padding: 50px;
    text-align: center;
}

form {
    display: flex;
    flex-direction: column;
    width: 300px;
    margin: auto;
}

input, textarea {
    margin: 10px 0;
    padding: 10px;
}

button {
    padding: 10px;
    background: #111;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #ff4d4d;
}

/* Footer */
footer {
    text-align: center;
    padding: 15px;
    background: #111;
    color: white;
    position: fixed;
    bottom: 0;
    width: 100%;
}
</style>

</head>
<body>

<header>
    <h1>FastExpress 🚚</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="contact">
    <h2>Contact Us</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>

<footer>
    <p>© 2026 FastExpress Delivery</p>
</footer>

</body>
</html>
